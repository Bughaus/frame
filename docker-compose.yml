services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vereinapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vereinapp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vereinapp}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vereinapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

# The backend and frontend services will be added here later once they are fully dockerized.
# For local dev, you will typically run them via standard npm commands.

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
